<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site.name }}{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}{{ site.owner }} — {{ site.tagline }}. Premium beauty services in Airoli, Navi Mumbai. Skin, Hair, Makeup, Nail Art & Beauty Classes.{% endblock %}">
    <meta name="keywords" content="beauty parlour airoli, ladies parlour navi mumbai, bridal makeup, hair treatment, skin care, nail art, beauty classes, {{ site.owner }}">
    <meta name="author" content="{{ site.owner }}">
    <meta property="og:title" content="{{ site.name }}">
    <meta property="og:description" content="{{ site.tagline }} — Premium beauty services by {{ site.owner }} in Airoli, Navi Mumbai.">
    <meta property="og:type" content="website">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💜</text></svg>">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Inter:wght@300;400;500;600;700&family=Dancing+Script:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- CSS: Common → Base → Page-specific -->
    <link rel="stylesheet" href="/static/css/common.css">
    <link rel="stylesheet" href="/static/css/base.css">
    {% block extra_css %}{% endblock %}
    <noscript>
        <style>
            .hero-content > *, .hero-scroll-hint { opacity: 1 !important; }
            .preloader { display: none !important; }
        </style>
    </noscript>
</head>
<body>
    <!-- Preloader -->
    <div class="preloader">
        <div class="preloader-inner">
            <div class="preloader-logo">LW</div>
            <div class="preloader-text">Lookwell</div>
        </div>
    </div>

    <!-- Custom Cursor -->
    <div class="cursor-dot"></div>
    <div class="cursor-ring"></div>

    <!-- Nav overlay for mobile -->
    <div class="nav-overlay" id="navOverlay"></div>

    {% include "partials/navbar.html" %}

    <main>
        {% block content %}{% endblock %}
    </main>

    {% include "partials/footer.html" %}
    {% include "partials/whatsapp_fab.html" %}

    <!-- Back to top -->
    <button class="back-to-top" id="backToTop" aria-label="Back to top">↑</button>

    <!-- JS Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- App JS: Common → Animations → Page-specific -->
    <script src="/static/js/common.js"></script>
    <script src="/static/js/animations.js"></script>
    {% block extra_js %}{% endblock %}

    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-analytics.js";
        const firebaseConfig = {
            apiKey: "AIzaSyAdrIziFUFlCTtfJlzBjuwGbCdfNd3cWPU",
            authDomain: "lookwell-73da0.firebaseapp.com",
            projectId: "lookwell-73da0",
            storageBucket: "lookwell-73da0.firebasestorage.app",
            messagingSenderId: "514543612481",
            appId: "1:514543612481:web:6938308f9ab7de6ba3ccc0",
            measurementId: "G-TLTL45EZ7Z"
        };
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
    </script>
</body>
</html>
