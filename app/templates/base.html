<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ═══ Primary Meta ═══ -->
    <title>{% block title %}{{ site.name }} — Best Ladies Beauty Parlour in Airoli, Navi Mumbai{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}{{ site.name }} by {{ site.owner }} — Professional beauty services in Airoli, Navi Mumbai. Bridal makeup, skin treatment, hair care, laser, nail art & beauty classes. {{ site.rating }}★ rated. Book now!{% endblock %}">
    <meta name="keywords" content="{% block meta_keywords %}beauty parlour airoli, ladies parlour navi mumbai, best beauty parlour mumbai, bridal makeup airoli, hair salon navi mumbai, skin treatment airoli, nail art navi mumbai, beauty classes navi mumbai, laser hair removal airoli, makeup artist navi mumbai, {{ site.owner }}, lookwell parlour{% endblock %}">
    <meta name="author" content="{{ site.owner }}">
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
    <meta name="theme-color" content="#7C3AED">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="{{ site.short_name }}">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <!-- ═══ Canonical ═══ -->
    <link rel="canonical" href="{% block canonical %}{{ site.site_url }}{% endblock %}">

    <!-- ═══ Open Graph / Facebook ═══ -->
    <meta property="og:type" content="{% block og_type %}website{% endblock %}">
    <meta property="og:site_name" content="{{ site.name }}">
    <meta property="og:title" content="{% block og_title %}{{ site.name }} — Best Ladies Beauty Parlour in Airoli{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Professional beauty services by {{ site.owner }} in Airoli, Navi Mumbai. Bridal makeup, skin treatment, hair care, nail art & more. {{ site.rating }}★ rated.{% endblock %}">
    <meta property="og:url" content="{% block og_url %}{{ site.site_url }}{% endblock %}">
    <meta property="og:image" content="{{ site.site_url }}{{ site.og_image }}">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:locale" content="en_IN">

    <!-- ═══ Twitter Card ═══ -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{% block twitter_title %}{{ site.name }} — Airoli, Navi Mumbai{% endblock %}">
    <meta name="twitter:description" content="{% block twitter_description %}Professional beauty services by {{ site.owner }}. Bridal makeup, skin care, hair & more. {{ site.rating }}★ rated.{% endblock %}">
    <meta name="twitter:image" content="{{ site.site_url }}{{ site.og_image }}">

    <!-- ═══ Geo / Local SEO ═══ -->
    <meta name="geo.region" content="IN-MH">
    <meta name="geo.placename" content="Airoli, Navi Mumbai, Maharashtra">
    <meta name="geo.position" content="{{ site.coordinates.lat }};{{ site.coordinates.lng }}">
    <meta name="ICBM" content="{{ site.coordinates.lat }}, {{ site.coordinates.lng }}">

    <!-- ═══ Favicon ═══ -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%237C3AED'/><text x='50' y='62' text-anchor='middle' font-family='serif' font-style='italic' font-size='38' font-weight='bold' fill='white'>Lw</text></svg>">

    <!-- ═══ Preconnect / DNS Prefetch ═══ -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
    <link rel="dns-prefetch" href="https://unpkg.com">
    <link rel="dns-prefetch" href="https://wa.me">

    <!-- ═══ Fonts ═══ -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Poppins:wght@300;400;500;600;700&family=Dancing+Script:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

    <!-- ═══ CSS: Common → Base → Page-specific ═══ -->
    <link rel="stylesheet" href="/static/css/common.css">
    <link rel="stylesheet" href="/static/css/base.css">
    {% block extra_css %}{% endblock %}

    <noscript>
        <style>
            .hero-content > *, .hero-scroll-hint { opacity: 1 !important; }
            .preloader { display: none !important; }
        </style>
    </noscript>

    <!-- ═══ Structured Data ═══ -->
    {% block structured_data %}{% endblock %}
</head>
<body class="page-{{ active_nav }}">
    <!-- Preloader -->
    <div class="preloader">
        <div class="preloader-inner">
            <div class="preloader-logo">LW</div>
            <div class="preloader-text">Lookwell</div>
        </div>
    </div>

    <!-- Custom Cursor -->
    <div class="cursor-dot"></div>
    <div class="cursor-ring"></div>

    <!-- Nav overlay for mobile -->
    <div class="nav-overlay" id="navOverlay"></div>

    {% include "partials/navbar.html" %}

    <main>
        {% block content %}{% endblock %}
    </main>

    {% include "partials/footer.html" %}
    {% include "partials/whatsapp_fab.html" %}

    <!-- Back to top -->
    <button class="back-to-top" id="backToTop" aria-label="Back to top">↑</button>

    <!-- JS Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- App JS: Common → Animations → Page-specific -->
    <script src="/static/js/common.js"></script>
    <script src="/static/js/animations.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
